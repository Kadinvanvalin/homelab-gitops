apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: immichframe-ingress
  namespace: immich
spec:
  rules:
    - host: immichframe.home
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: immichframe
                port:
                  number: 8080
