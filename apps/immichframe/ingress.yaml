apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: immichframe-ingress
  namespace: immich
  annotations:
    traefik.ingress.kubernetes.io/router.tls.certresolver: cloudflare
spec:
  rules:
    - host: immichframe.home.kadin.codes
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: immichframe
                port:
                  number: 8080
  tls:
    - hosts:
        - immichframe.home.kadin.codes
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: immichframe-ingress-http
  namespace: immich
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  rules:
    - host: immichframe.home.kadin.codes
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: immichframe
                port:
                  number: 8080
