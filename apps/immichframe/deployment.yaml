apiVersion: apps/v1
kind: Deployment
metadata:
  name: immichframe
  namespace: immich
spec:
  replicas: 1
  selector:
    matchLabels:
      app: immichframe
  template:
    metadata:
      labels:
        app: immichframe
    spec:
      containers:
        - name: immichframe
          image: ghcr.io/immichframe/immichframe:latest
          ports:
            - containerPort: 8080
          env:
            - name: TZ
              value: America/Chicago
            - name: ApiKey
              valueFrom:
                secretKeyRef:
                  name: immichframe-secret
                  key: api-key
          volumeMounts:
            - name: config
              mountPath: /app/Config
      volumes:
        - name: config
          configMap:
            name: immichframe-settings
---
apiVersion: v1
kind: Service
metadata:
  name: immichframe
  namespace: immich
spec:
  selector:
    app: immichframe
  ports:
    - port: 8080
      targetPort: 8080
  type: ClusterIP
