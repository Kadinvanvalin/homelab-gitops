apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: immich
  namespace: home-assistant
spec:
  project: default
  source:
    repoURL:  https://github.com/Kadinvanvalin/homelab-gitops.git
    targetRevision: main
    path: apps/home-assistant
  destination:
    server: https://kubernetes.default.svc
    namespace: home-assistant
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
