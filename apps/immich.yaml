apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: immich
spec:
  project: default
  source:
    repoURL:  https://github.com/Kadinvanvalin/homelab-gitops.git
    targetRevision: main
    path: apps/immich
  destination:
    server: https://kubernetes.default.svc
    namespace: immich
  syncPolicy:
    automated: { prune: true, selfHeal: true }